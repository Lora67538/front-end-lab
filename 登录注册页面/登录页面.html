<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录页面</title>
  <link rel="stylesheet" href="style1.css">
  <link rel="stylesheet" href="base.css">
</head>

<body>
  <div class="log-in">
    <div class="up">
      <div class="up-1">
        <h3>欢迎登录</h3>
      </div>
      <div class="up-2">
        <small>请输入您的账号信息</small>
      </div>
    </div>
    <form action="https://httpbin.org/post" method="POST">
      <div class="mid">
        <div class="mid-1 w">
          <small>用户名</small> <br>
          <input type="text" name="username" placeholder="请输入用户名">
        </div>
        <div class="mid-1 mid-2 w">
          <small>密码</small> <br>
          <input type="password" name="password" placeholder="请输入密码">
        </div>
      </div>
      <div class="w down">
        <div>
          <input type="checkbox">
          <small>记住我</small>
        </div>
        <div>
          <a href="#">忘记密码?</a>
        </div>
      </div>
      <div class="button w">
        <button type="submit">登录</button>
      </div>
    </form>
    <div class="foot w">
      <small>还没有账号? <a href="./注册页面.html">立即注册</a></small>
    </div>
  </div>

</body>

</html>
