<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=\, initial-scale=1.0">
  <title>小米卡片</title>
  <style>
    /* css初始化 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: gray;
    }

    .card {
      width: 234px;
      height: 300px;
      background-color: white;
      margin: 100px auto;
      text-align: center;
      transition: all .4s;
    }

    .card:hover {
      box-shadow: 0 15px 30px rgba(0, 0, 0, .1);
    }

    .card img {
      width: 160px;
      height: 160px;
      margin-top: 20px;
    }

    .card .title {
      font-size: 14px;
      font-weight: 400;
      color: #333;
      margin-top: 18px;
    }

    .card .desc {
      font-size: 12px;
      color: #b0b0b0;
      margin-bottom: 10px;
      /* 单行文本溢出省略号 */
      /* 溢出隐藏 */
      overflow: hidden;
      /* 文字超出部分省略号 */
      text-overflow: ellipsis;
      /* 不换行 */
      white-space: nowrap;
      padding: 0 10px;
    }

    .card .price {
      font-size: 14px;
      color: #b0b0b0;
    }

    .card .price span {
      font-size: 14px;
      color: #ff6700;
    }
  </style>
</head>

<body>
  <div class="card">
    <img src="./img/mi.webp" alt="">
    <h3 class="title">Xiaomi Buds 5</h3>
    <p class="desc">舒适无感佩戴 | 高通全链路无损音频 | 哈曼AudioEFX 联合调音</p>
    <p class="price">
      <span>659元</span>
      <del>699元</del>
    </p>

  </div>
</body>

</html>
